name: Fetch MAS Motus Receiver Data

on:
  schedule:
    # Daily during spring migration (March 20 - May 31)
    - cron: '0 6 * 3-5 *'
    # Daily during fall migration (August 1 - November 15)
    - cron: '0 6 * 8-10 *'
    - cron: '0 6 1-15 11 *'
    # Weekly (Sunday) during off-season (December - March 19, June - July)
    - cron: '0 6 * 12 0'
    - cron: '0 6 1-19 3 0'
    - cron: '0 6 * 6-7 0'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(
            c('motus', 'dplyr', 'jsonlite'),
            repos = c(
              birdscanada = 'https://birdscanada.r-universe.dev',
              CRAN = 'https://cloud.r-project.org'
            )
          )"

      - name: Fetch and export detections
        env:
          MOTUS_USER: ${{ secrets.MOTUS_USER }}
          MOTUS_PASS: ${{ secrets.MOTUS_PASS }}
        run: |
          Rscript -e "
            library(motus)
            library(dplyr)
            library(jsonlite)

            dir.create('data', showWarnings = FALSE)

            options(motus.userLogin = Sys.getEnv('MOTUS_USER')
            options(motus.userPassword = Sys.getEnv('MOTUS_PASS')
            
            recv <- tagme(
              'CTT-V3023D415E26',
              new = !file.exists('data/CTT-V3023D415E26.motus'),
              dir = 'data/'
            )

            detections <- tbl(recv, 'alltags') %>%
              filter(motusFilter == 1) %>%
              select(
                date = ts,
                commonName = speciesEN,
                scientificName = speciesSci,
                tagId = mfgID,
                project = projectName
              ) %>%
              collect() %>%
              mutate(date = as.POSIXct(date, origin = '1970-01-01', tz = 'UTC')) %>%
              arrange(desc(date)) %>%
              slice_head(n = 25)

            output <- list(
              updated = format(Sys.time(), '%Y-%m-%dT%H:%M:%SZ', tz = 'UTC'),
              detections = detections
            )
            
            write_json(output, 'data/latest_detections.json', pretty = TRUE, auto_unbox = TRUE)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_detections.json
          git commit -m "Update Motus detections $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
