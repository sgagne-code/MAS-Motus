name: Fetch MAS Motus Receiver Data

on:
  schedule:
      # Weekly (Sunday) during spring migration (March 20 - May 31)
      - cron: '0 6 * 3-5 0'
      # Weekly (Sunday) during fall migration (August - November)
      - cron: '0 6 * 8-11 0'
      # Monthly (1st of month) during off-season (December, January, February, June, July)
      - cron: '0 6 1 12 *'
      - cron: '0 6 1 1-2 *'
      - cron: '0 6 1 6-7 *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-motus-v1
          restore-keys: |
            ${{ runner.os }}-r-motus-

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(
            c('motus', 'dplyr', 'jsonlite'),
            repos = c(
              birdscanada = 'https://birdscanada.r-universe.dev',
              CRAN = 'https://cloud.r-project.org'
            )
          )"

      - name: Set up .Renviron
        env:
          MOTUS_USER: ${{ secrets.MOTUS_USER }}
          MOTUS_PASS: ${{ secrets.MOTUS_PASS }}
        run: |
          echo "MOTUS_USER=$MOTUS_USER" >> ~/.Renviron
          echo "MOTUS_PASS=$MOTUS_PASS" >> ~/.Renviron

      - name: Fetch and export detections
        env:
          MOTUS_USER: ${{ secrets.MOTUS_USER }}
          MOTUS_PASS: ${{ secrets.MOTUS_PASS }}
        run: |
          Rscript -e "
            library(motus)
            library(dplyr)
            library(jsonlite)

            Sys.setenv(TZ = 'UTC')

            motus:::sessionVariable(name = 'userLogin', val = Sys.getenv('MOTUS_USER'))
            motus:::sessionVariable(name = 'userPassword', val = Sys.getenv('MOTUS_PASS'))

            dir.create('data', showWarnings = FALSE)

            recv <- tagme(
              'CTT-V3023D415E26',
              new = FALSE,
              update = FALSE,
              dir = 'data/'
            )

            metadata(recv)

            tag_deps <- tbl(recv, 'tagDeps') %>%
              collect() %>%
              select(deployID, sex, age)

            proj_ids <- tbl(recv, 'projects') %>%
              collect() %>%
              select(id, name)

            new_detections <- tbl(recv, 'alltags') %>%
              filter(motusFilter == 1) %>%
              collect() %>%
              group_by(runID) %>%
              slice_min(ts, n = 1) %>%
              ungroup() %>%
              left_join(tag_deps, by = c('tagDeployID' = 'deployID')) %>%
              left_join(proj_ids, by = c('tagProjID' = 'id')) %>%
              select(
                date = ts,
                commonName = speciesEN,
                scientificName = speciesSci,
                tagId = mfgID,
                project = tagProjName,
                projectId = tagProjID,
                sex = sex,
                age = age,
                tagDepLat = tagDepLat,
                tagDepLon = tagDepLon
              ) %>%
              mutate(
                date = as.POSIXct(date, origin = '1970-01-01', tz = 'UTC'),
                date = format(date, '%Y-%m-%dT%H:%M:%SZ'),
                id = paste0(tagId, '_', date),
                locationName = NA
              )

            existing_path <- 'data/latest_detections.json'
            if (file.exists(existing_path)) {
              existing <- fromJSON(existing_path, flatten = TRUE)
              existing_detections <- as.data.frame(existing\$detections)
              combined <- bind_rows(existing_detections, new_detections) %>%
                distinct(id, .keep_all = TRUE) %>%
                arrange(desc(date))
            } else {
              combined <- new_detections %>%
                arrange(desc(date))
            }

            output <- list(
              updated = format(Sys.time(), '%Y-%m-%dT%H:%M:%SZ', tz = 'UTC'),
              detections = combined
            )

            write_json(output, existing_path, pretty = TRUE, auto_unbox = TRUE, na = 'null')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_detections.json
          git commit -m "Update Motus detections $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
